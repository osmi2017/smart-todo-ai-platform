services:
  postgres:
    image: postgres:14
    container_name: todo_ai_db
    environment:
      POSTGRES_DB: ${DB_NAME:-todo_ai}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-todo_ai}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - todo_ai_network

  redis:
    image: redis:7
    container_name: todo_ai_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - todo_ai_network

  kafka:
    image: apache/kafka:3.9.0
    container_name: todo_ai_kafka
    restart: unless-stopped
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 20s
    networks:
      - todo_ai_network

  kafka-init:
    image: apache/kafka:3.9.0
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      sh -c "
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic ${KAFKA_EVENTS_TOPIC:-smart-todo.events} --partitions ${KAFKA_TOPIC_PARTITIONS:-6} --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic ${KAFKA_DEAD_LETTER_TOPIC:-smart-todo.events.dlq} --partitions ${KAFKA_TOPIC_PARTITIONS:-6} --replication-factor 1
      "
    networks:
      - todo_ai_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo_ai_backend
    command: sh -c "python manage.py migrate --noinput && gunicorn --bind 0.0.0.0:8000 core.wsgi:application"
    environment:
      DEBUG: ${DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-todo_ai}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      KAFKA_ENABLED: "True"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_EVENTS_TOPIC: ${KAFKA_EVENTS_TOPIC:-smart-todo.events}
      KAFKA_DEAD_LETTER_TOPIC: ${KAFKA_DEAD_LETTER_TOPIC:-smart-todo.events.dlq}
      ML_SERVICE_URL: http://ml-service:5001
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      ml-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8000), 2).close()"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - ./backend:/app
    networks:
      - todo_ai_network

  # Worker Celery : exécute en arrière-plan toutes les opérations lourdes
  # (rappels de meetings en masse, transcription/traitement IA audio-vidéo,
  # génération de rapports de projet) sans jamais bloquer l'API/l'UI.
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo_ai_celery_worker
    # -Q default,heavy : écoute la file rapide (rappels/notifications) et la
    # file lourde (audio/vidéo, rapports). En prod, on peut scinder ces deux
    # files sur des workers/containers séparés pour isoler la charge lourde.
    command: celery -A core worker -l info -Q default,heavy --concurrency=4
    environment:
      DEBUG: ${DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-todo_ai}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      ML_SERVICE_URL: http://ml-service:5001
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - todo_ai_network

  celery-events:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A core worker -l info -Q events --concurrency=2
    environment:
      DEBUG: ${DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-todo_ai}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      KAFKA_ENABLED: "True"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_EVENTS_TOPIC: ${KAFKA_EVENTS_TOPIC:-smart-todo.events}
      KAFKA_DEAD_LETTER_TOPIC: ${KAFKA_DEAD_LETTER_TOPIC:-smart-todo.events.dlq}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    networks:
      - todo_ai_network

  # Scheduler Celery Beat : déclenche les tâches périodiques (rappels de
  # meetings toutes les 5 min, alertes de jalons quotidiennes, nettoyage).
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo_ai_celery_beat
    command: celery -A core beat -l info
    environment:
      DEBUG: ${DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-todo_ai}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      ML_SERVICE_URL: http://ml-service:5001
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - todo_ai_network

  kafka-audit-consumer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python manage.py consume_events audit
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-todo_ai}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      KAFKA_ENABLED: "True"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_EVENTS_TOPIC: ${KAFKA_EVENTS_TOPIC:-smart-todo.events}
      KAFKA_DEAD_LETTER_TOPIC: ${KAFKA_DEAD_LETTER_TOPIC:-smart-todo.events.dlq}
    depends_on:
      backend:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    networks:
      - todo_ai_network

  kafka-statistics-consumer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python manage.py consume_events statistics
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-todo_ai}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      KAFKA_ENABLED: "True"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_EVENTS_TOPIC: ${KAFKA_EVENTS_TOPIC:-smart-todo.events}
      KAFKA_DEAD_LETTER_TOPIC: ${KAFKA_DEAD_LETTER_TOPIC:-smart-todo.events.dlq}
    depends_on:
      backend:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    networks:
      - todo_ai_network

  kafka-notifications-consumer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python manage.py consume_events notifications
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-todo_ai}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      KAFKA_ENABLED: "True"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_EVENTS_TOPIC: ${KAFKA_EVENTS_TOPIC:-smart-todo.events}
      KAFKA_DEAD_LETTER_TOPIC: ${KAFKA_DEAD_LETTER_TOPIC:-smart-todo.events.dlq}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    networks:
      - todo_ai_network

  kafka-audio-consumer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python manage.py consume_events audio
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-todo_ai}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      KAFKA_ENABLED: "True"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_EVENTS_TOPIC: ${KAFKA_EVENTS_TOPIC:-smart-todo.events}
      KAFKA_DEAD_LETTER_TOPIC: ${KAFKA_DEAD_LETTER_TOPIC:-smart-todo.events.dlq}
      ML_SERVICE_URL: http://ml-service:5001
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      ml-service:
        condition: service_started
    volumes:
      - ./backend:/app
    networks:
      - todo_ai_network

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: todo_ai_ml
    environment:
      KAFKA_STATS_FILE: /app/stats/kafka_stats_state.json
    ports:
      - "5001:5001"
    volumes:
      - ./ml-service:/app
      - ml_models:/app/models
      - ml_stats:/app/stats
    networks:
      - todo_ai_network

  # Consommateur de statistiques ML : groupe de consommateurs indépendant
  # (smart-todo.ml-statistics) qui agrège les tâches complétées sans jamais
  # ralentir le serveur de prédiction Flask.
  ml-stats-consumer:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python kafka_consumer.py
    environment:
      KAFKA_ENABLED: "True"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_EVENTS_TOPIC:-smart-todo.events}
      KAFKA_DLQ_TOPIC: ${KAFKA_DEAD_LETTER_TOPIC:-smart-todo.events.dlq}
      KAFKA_STATS_FILE: /app/stats/kafka_stats_state.json
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./ml-service:/app
      - ml_stats:/app/stats
    networks:
      - todo_ai_network

  meeting-service:
    build:
      context: ./meeting-service
      dockerfile: Dockerfile
    container_name: todo_ai_meeting
    environment:
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
      KAFKA_ENABLED: "True"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_EVENTS_TOPIC:-smart-todo.events}
      KAFKA_DLQ_TOPIC: ${KAFKA_DEAD_LETTER_TOPIC:-smart-todo.events.dlq}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "4000:4000"
    volumes:
      - ./meeting-service:/app
      - /app/node_modules
    networks:
      - todo_ai_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo_ai_frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
      REACT_APP_ML_URL: http://localhost:5001
      REACT_APP_MEETING_SERVICE_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - meeting-service
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - todo_ai_network

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  ml_models:
  ml_stats:

networks:
  todo_ai_network:
    driver: bridge
