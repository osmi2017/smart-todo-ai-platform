version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: todo_ai_db
    environment:
      POSTGRES_DB: ${DB_NAME:-todo_ai}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - todo_ai_network

  redis:
    image: redis:7
    container_name: todo_ai_redis
    ports:
      - "6379:6379"
    networks:
      - todo_ai_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo_ai_backend
    environment:
      DEBUG: ${DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-todo_ai}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      REDIS_URL: redis://redis:6379/0
      ML_SERVICE_URL: http://ml-service:5001
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - ml-service
    volumes:
      - ./backend:/app
    networks:
      - todo_ai_network

  # Worker Celery : exécute en arrière-plan toutes les opérations lourdes
  # (rappels de meetings en masse, transcription/traitement IA audio-vidéo,
  # génération de rapports de projet) sans jamais bloquer l'API/l'UI.
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo_ai_celery_worker
    # -Q default,heavy : écoute la file rapide (rappels/notifications) et la
    # file lourde (audio/vidéo, rapports). En prod, on peut scinder ces deux
    # files sur des workers/containers séparés pour isoler la charge lourde.
    command: celery -A core worker -l info -Q default,heavy --concurrency=4
    environment:
      DEBUG: ${DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-todo_ai}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      REDIS_URL: redis://redis:6379/0
      ML_SERVICE_URL: http://ml-service:5001
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    networks:
      - todo_ai_network

  # Scheduler Celery Beat : déclenche les tâches périodiques (rappels de
  # meetings toutes les 5 min, alertes de jalons quotidiennes, nettoyage).
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo_ai_celery_beat
    command: celery -A core beat -l info
    environment:
      DEBUG: ${DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-todo_ai}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      REDIS_URL: redis://redis:6379/0
      ML_SERVICE_URL: http://ml-service:5001
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    networks:
      - todo_ai_network

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: todo_ai_ml
    ports:
      - "5001:5001"
    volumes:
      - ./ml-service:/app
      - ml_models:/app/models
    networks:
      - todo_ai_network

  meeting-service:
    build:
      context: ./meeting-service
      dockerfile: Dockerfile
    container_name: todo_ai_meeting
    environment:
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"
    volumes:
      - ./meeting-service:/app
      - /app/node_modules
    networks:
      - todo_ai_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo_ai_frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
      REACT_APP_ML_URL: http://localhost:5001
      REACT_APP_MEETING_SERVICE_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - meeting-service
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - todo_ai_network

volumes:
  postgres_data:
  ml_models:

networks:
  todo_ai_network:
    driver: bridge
